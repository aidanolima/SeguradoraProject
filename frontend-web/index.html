<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes e Apólices | Em Breve</title>
    
    <meta name="description" content="Plataforma completa para gestão de clientes e apólices de seguro. Revolucione sua corretora.">
    <meta name="theme-color" content="#7b1fa2">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.gestaoclienteseapolices.com.br/">
    <meta property="og:title" content="Gestão de Clientes e Apólices">
    <meta property="og:description" content="O futuro da gestão de seguros. Revolucione a forma como você gerencia suas apólices.">
    <meta property="og:image" content="https://www.gestaoclienteseapolices.com.br/assets/logo.png">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/logo.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* (MANTENHA AQUI TODO O SEU CSS QUE JÁ ESTAVA NO INDEX) */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #2c3e50;
        }

        .landing-container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1s ease-in-out;
        }

        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #003366;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .badge-lancamento {
            display: inline-block;
            background-color: #7b1fa2;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-link {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #999;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-link:hover {
            color: #7b1fa2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <img src="assets/logo.png" alt="Logo Gestão de Clientes e Apólices" class="logo">
        
        <h1>O Futuro da Gestão de Clientes e Apólices</h1>
        <p>Estamos preparando uma plataforma completa para revolucionar a forma como você gerencia suas apólices e clientes.</p>
        
        <div class="badge-lancamento">Lançamento em Breve</div>
    </div>

    <a href="login.html" class="footer-link">Acesso Restrito</a>

</body>
</html>
